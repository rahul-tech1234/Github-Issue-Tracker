<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Github-Issue-Tracker</title>
        <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
        <!-- Tailwind and Daisy UI -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Google Font Family and CDN link  -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        




<dialog id="issue_details" class="modal">
                    <div id="details-container" class="space-y-3">
                        <div>
                            <h3
                                class="text-lg font-bold text-[#1F2937] text-[24px]"
                            >
                                Fix broken image uploads
                            </h3>
                            <div class="flex justify-start gap-4 items-center">
                                <p
                                    class="text-[#64748B] text-[12px] font-medium"
                                >
                                    Opened by Fahim Ahmed
                                </p>
                                <button
                                    class="btn bg-[#00A96E] rounded-full text-white py-0"
                                >
                                    Opened
                                </button>
                                <p
                                    class="text-[#64748B] text-[12px] font-medium"
                                >
                                    22/02/2026
                                </p>
                            </div>

                            <div class="card-actions justify-between">
                                <button
                                    class="px-4 py-1 text-[14px] rounded-2xl font-medium bg-red-100 text-[red]"
                                >
                                    BUG
                                </button>
                                <button
                                    class="px-4 py-1 text-[14px] rounded-2xl bg-yellow-100 text-[#D97706]"
                                >
                                    help wanted
                                </button>
                            </div>

                            <p class="text-[#64748B] text-[16px] font-medium">
                                The navigation menu doesn't collapse properly on
                                mobile devices. Need to fix the responsive
                                behavior.
                            </p>

                            <div
                                class="card w-full bg-base-100 card-xs shadow-sm"
                            >
                                <div class="flex justify-start gap-25 p-3">
                                    <div class="space-y-5">
                                        <p
                                            class="text-[#64748B] text-[16px] font-medium"
                                        >
                                            Assignee:
                                        </p>
                                        <h3
                                            class="text-[#1F2937] text-[16px] font-semibold"
                                        >
                                            Fahim Ahmed
                                        </h3>
                                    </div>
                                    <div class="space-y-5">
                                        <p
                                            class="text-[#64748B] text-[16px] font-medium"
                                        >
                                            Priority
                                        </p>

                                        <button
                                            class="border-none bg-[#EF4444] rounded-full text-white py-0 px-3"
                                        >
                                            High
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="modal-action">
                            <form method="dialog">
                                <!-- if there is a button in form, it will close the modal -->
                                <button class="btn">Close</button>
                            </form>
                        </div>
                    </div>
                </dialog>




















        <!-- <div class="card card-body shadow-2xl">
            <button class="btn btn-xs px-6">All</button>
            <div id="tab-container"></div>
        </div> -->

        <div
            class="log-page w-[400px] mx-auto mt-[8rem] shadow-md rounded-lg p-2 mb-4"
        >
            <form action="" class="p-8 space-y-2">
                <legend class="text-center">
                    <i class="fa-brands fa-github text-[50px] text-center"></i>
                </legend>
                <h2 class="text-center text-2xl color-[#000] font-semibold">
                    GitHub Issues Tracker
                </h2>
                <p class="text-center text-[#64748B] text-[16px] font-medium">
                    Sign in to manage your issues
                </p>
                <label
                    for="user-name"
                    class="text-16px font-medium text--[#000]"
                    >Username</label
                ><br />
                <input
                    type="text"
                    name="name"
                    id="user-name"
                    placeholder="Enter Username"
                    class="w-[100%] block rounded-lg p-2 border border-[#ddd] shadow-md"
                />
                <p class="text-[#4A00FF] text-14 font-normal">Default: admin</p>
                <label for="password" class="text-16px font-medium text--[#000]"
                    >Password</label
                >
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Enter Password"
                    class="w-[100%] rounded-lg p-2 border border-[#ddd] shadow-md"
                />
                <p class="text-[#4A00FF] text-14 font-normal">
                    Default: admin123
                </p>
                <button
                    id="login-btn"
                    class="btn btn-primary w-[100%] mx-auto"
                    onclick="getUserValue()"
                >
                    Sign In
                </button>
            </form>
        </div>
        <script src="login.js"></script>
    </body>
</html>
